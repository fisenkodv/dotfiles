- defaults:
    shell:
      stdout: true
      stderr: true
      quiet: true

- link:
    ~/.config/git/config.local: config/git/config.personal
    ~/.claude: config/claude

- shell:
    - command: brew bundle install --file=os/macos/brewfile
      description: 📦 Installing brew packages
    - command: brew update
      description: 📦 Updating brew
    - command: brew upgrade
      description: 📦 Upgrading brew packages
    - command: brew cleanup
      description: 🧹 Cleaning up brew
    - command: mise install
      description: 🛠️ Installing mise tools
    - command: claude plugin marketplace remove claude-plugins-official || true
      description: 🔌 Refreshing Claude plugins
    - command: claude plugin marketplace add anthropics/claude-plugins-official
    - command: claude plugin install commit-commands@claude-plugins-official
    - command: claude plugin install context7@claude-plugins-official
    - command: claude plugin install explanatory-output-style@claude-plugins-official
    - command: claude plugin install frontend-design@claude-plugins-official
    - command: claude plugin install github@claude-plugins-official
    - command: claude plugin install typescript-lsp@claude-plugins-official
    - command: claude plugin install rust-analyzer-lsp@claude-plugins-official
