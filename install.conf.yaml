- defaults:
    link:
      relink: true
      force: false
    shell:
      stdout: true
      stderr: true
      quiet: true

- clean: ["~"]

- shell:
    - command: git submodule update --init modules/dotbot
      description: 📦 Installing/updating dotbot

- link:
    ~/.claude: config/claude
    ~/.config/nvim: config/nvim
    ~/.config/git/config: config/git/config
    ~/.config/git/ignore: config/git/ignore
    ~/.config/htop: config/htop
    ~/.config/tmux: config/tmux
    ~/.config/ghostty: config/ghostty
    ~/.config/kitty: config/kitty
    ~/.config/zed: config/zed
    ~/.config/mise: config/mise
    ~/.config/yazi: config/yazi
    ~/.config/atuin: config/atuin
    ~/.config/zellij: config/zellij
    ~/.config/fish: config/fish
    ~/.config/just: config/just
    ~/.config/starship.toml: config/starship/starship.toml
    ~/.config/zsh: config/zsh
    ~/.zshrc: config/zsh/zshrc.zsh

- shell:
    - command: ./scripts/change-shell.sh
      description: 🐚 Setting default shell to fish
    - command: claude plugin marketplace remove claude-plugins-official || true
      description: 🔌 Refreshing Claude plugins
    - command: claude plugin marketplace add anthropics/claude-plugins-official
    - command: claude plugin install commit-commands@claude-plugins-official
    - command: claude plugin install context7@claude-plugins-official
    - command: claude plugin install explanatory-output-style@claude-plugins-official
    - command: claude plugin install frontend-design@claude-plugins-official
    - command: claude plugin install github@claude-plugins-official
    - command: claude plugin install typescript-lsp@claude-plugins-official
    - command: claude plugin install rust-analyzer-lsp@claude-plugins-official
